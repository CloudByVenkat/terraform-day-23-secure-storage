directory:
  - .

output: cli
compact: true
quiet: false

framework:
  - terraform

download-external-modules: true

# Skip checks with valid justifications
skip-check:
  - CKV_AZURE_33   # Queue logging is in separate azurerm_storage_account_queue_properties resource
  - CKV2_AZURE_1   # Storage account uses CMK (customer-managed key)
  - CKV2_AZURE_8   # Storage account uses CMK (alternate check)
  - CKV_AZURE_206  # Storage logging via separate queue_properties resource
  - CKV2_AZURE_40  # Shared key required for customer-managed key (CMK) functionality
  - CKV_AZURE_109  # Public access enabled for Terraform deployment (disable after initial setup)
  - CKV_AZURE_189 # RBAC role assignment propagation delay (handled with time_sleep resource)

name: Terraform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod

env:
  TF_VERSION: "1.6.0"

jobs:
  # =========================
  # 1️⃣ VALIDATE & PLAN
  # =========================
  validate:
    name: Validate & Plan
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      GITHUB_TOKEN: ${{ github.token }}
    outputs:
      branch_name: ${{ github.ref_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache TFLint Plugin
        uses: actions/cache@v3
        with:
          path: ~/.tflint.d
          key: ${{ runner.os }}-tflint-${{ hashFiles('.tflint.hcl') }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3
        with:
          tflint_version: latest
          github_token: ${{ github.token }}

      - name: Initialize TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install Python Tools
        run: pip install pre-commit checkov

      - name: Run Pre-commit Hooks
        run: pre-commit run --all-files

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      # Plan for the appropriate workspace based on branch
      - name: Terraform Plan (Dev Workspace)
        if: github.ref == 'refs/heads/develop'
        run: |
          terraform workspace select dev || terraform workspace new dev
          terraform plan -out=tfplan-dev

      - name: Terraform Plan (Prod Workspace)
        if: github.ref == 'refs/heads/main'
        run: |
          terraform workspace select prod || terraform workspace new prod
          terraform plan -out=tfplan-prod

      - name: Upload Plan Artifact (Dev)
        if: github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: tfplan-dev

      - name: Upload Plan Artifact (Prod)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: tfplan-prod

  # =========================
  # 2️⃣ DEPLOY TO DEV WORKSPACE
  # =========================
  deploy-dev:
    name: Deploy to Dev Workspace
    needs: validate
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/develop' &&
      github.event_name == 'push'
    environment: dev
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev

      - name: Terraform Init
        run: terraform init

      - name: Select Dev Workspace
        run: terraform workspace select dev || terraform workspace new dev

      - name: Show Current Workspace
        run: |
          echo "Current workspace:"
          terraform workspace show

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan-dev

  # =========================
  # 3️⃣ DEPLOY TO PROD WORKSPACE
  # =========================
  deploy-prod:
    name: Deploy to Prod Workspace
    needs: validate
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    environment: prod
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod

      - name: Terraform Init
        run: terraform init

      - name: Select Prod Workspace
        run: terraform workspace select prod || terraform workspace new prod

      - name: Show Current Workspace
        run: |
          echo "Current workspace:"
          terraform workspace show

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan-prod
